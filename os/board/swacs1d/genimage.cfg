# SWACS-1D genimage.cfg
# =====================
# 3-partition GPT layout for a DDR arcade OS (RootDDR v2.0).
#
# DISK PARTITION SCHEME
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Partition   │ Type   │ Size      │ Mount  │ Purpose                     │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ boot        │ FAT32  │ 512 MB    │ /boot  │ EFI System Partition;       │
# │ (ESP)       │ (ESP)  │           │        │ grub.cfg + bzImage          │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ root        │ squash │ 4096 MB   │ /      │ Read-only OS layer;         │
# │ (ROOT_SYSTEM│ fs     │           │        │ MAME + X11 + ddr-picker     │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ roms        │ gvfat  │ remainder │ /mnt/  │ User-writable;              │
# │ (ROMS)      │ 0x07   │ of disk   │ roms   │ DDR System 573 ROM CHD      │
# │             │        │           │        │ files (exFAT at runtime)    │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ save        │ gvfat  │ remainder │ /mnt/  │ User-writable;              │
# │ (SAVE)      │ 0x07   │ after     │ save   │ cfg, nvram, sav,            │
# │             │        │ roms      │        │ state.json, input-map.json  │
# └──────────────────────────────────────────────────────────────────────────┘
#
# EXFAT NOTE: Partitions 3 (ROMS) and 4 (SAVE) use the "gvfat" image type so
# genimage writes a blank image of the requested size. At runtime the init
# scripts mount them with the kernel exfat driver (mount -t exfat); if the
# exfat kernel module is unavailable the scripts fall back to fuse-exfat.
#
# PARTITION-TYPE-UUID chart:
#  c12a7328-f81f-11d2-ba4b-00a0c93ec93b  — EFI System Partition (ESP)
#  4f68bce3-e8cd-4db1-96e7-fbcaf984b709  — Linux Root / x86-64 (ROOT_SYSTEM)
#  0727c47a-ab4d-48d1-9968-d70a68e27d30  — 0x07 Linux rootfs / exFAT data (ROMS·SAVE)
#
# PARTUUID references used by grub.cfg:
#  ROOT_SYSTEM  b7a69b76-4d2c-473d-82d2-8b431718cb1a
#  ROMS         d1e879a3-2c5b-4f6a-8d9e-1c2b3a4f5e6d
#  SAVE         e2f890b4-3d6c-5g7b-9e0f-2d3c4b5a6c7e

# ── raw partition table (16 GB disk, 512 MB + 4096 MB + remainder) ───────────
image swacs1d.img {
    hdimage {
        partition-table-type = "gpt"
    }

    # PARTITION 1 — EFI BOOT (FAT32 ESP)
    # Contains grubx64.efi + grub.cfg + bzImage; written by post-image.sh
    partition boot {
        offset = 1M
        partition-type-uuid = "c12a7328-f81f-11d2-ba4b-00a0c93ec93b"
        partition-uuid = "a1a2a3a4-b5c6-d7e8-f901-234567890abc"
        bootable = true
        label = "boot"
    }

    # PARTITION 2 — ROOT_SYSTEM (Linux Root, squashfs, read-only)
    # filled by Buildroot's BR2_TARGET_ROOTFS_SQUASHFS output
    partition root {
        offset = 513M
        partition-type-uuid = "4f68bce3-e8cd-4db1-96e7-fbcaf984b709"
        partition-uuid = "b7a69b76-4d2c-473d-82d2-8b431718cb1a"
        label = "ROOT_SYSTEM"
    }

    # PARTITION 3 — ROMS (gvfat / exFAT, user-writable)
    # Mounted at /mnt/roms at runtime (S10roms_mount.sh).
    partition roms {
        offset = 4609M           # 513M offset + 4096M root
        size = 8192M             # 8 GB default; growable to disk capacity
        partition-type-uuid = "0727c47a-ab4d-48d1-9968-d70a68e27d30"  # 0x07 exFAT data
        partition-uuid = "d1e879a3-2c5b-4f6a-8d9e-1c2b3a4f5e6d"
        label = "ROMS"
    }

    # PARTITION 4 — SAVE (gvfat / exFAT, user-writable)
    # Mounted at /mnt/save at runtime (S11save_mount.sh).
    # Holds state.json, input-map.json, cfg/nvram/sav per game.
    partition save {
        offset = 12801M          # 4609M offset + 8192M roms
        size = 3072M             # 3 GB; occupies remaining disk tail
        partition-type-uuid = "0727c47a-ab4d-48d1-9968-d70a68e27d30"  # 0x07 exFAT data
        partition-uuid = "e2f890b4-3d6c-5g7b-9e0f-2d3c4b5a6c7e"
        label = "SAVE"
    }
}
