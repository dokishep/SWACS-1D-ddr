# ALSA low-latency configuration for DDR rhythm gameplay
# Target <1ms audio latency

pcm.!default {
    type plug
    slave.pcm "low_latency"
}

pcm.low_latency {
    type dmix
    ipc_key 1024
    slave {
        pcm "hw:0,0"
        rate 48000
        period_time 0
        period_size 128
        buffer_size 512
    }
}

ctl.!default {
    type hw
    card 0
}