# ALSA low-latency configuration for DDR rhythm gameplay
# Target <10 ms total roundtrip audio latency
# period_size = 128 frames @ 48 kHz ≈ 2.7 ms
# buffer_size  = 512 frames @ 48 kHz ≈ 10.7 ms

pcm.!default {
    type plug
    slave.pcm "low_latency"
}

pcm.low_latency {
    type dmix
    ipc_key 1024
    slave {
        pcm "hw:0,0"
        rate 48000
        period_time 0
        period_size 128
        buffer_size 512
    }
}

ctl.!default {
    type hw
    card 0
}
