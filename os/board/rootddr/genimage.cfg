# Image for the EFI Boot Partition (FAT32)
image efi-part.vfat {
    vfat {
        file EFI {
            image = "efi-part/EFI"
        }
        file bzImage {
            image = "bzImage"
        }
    }
    size = 128M
}

# The final physical disk image
image rootddr.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition boot {
        image = "efi-part.vfat"
        offset = 1M
        partition-type-uuid = "c12a7328-f81f-11d2-ba4b-00a0c93ec93b"
        bootable = true
    }

    partition root {
        image = "rootfs.squashfs"
        partition-type-uuid = "4f68bce3-e8cd-4db1-96e7-fbcaf984b709"
        partition-uuid = "a7b8c9d0-e1f2-4a3b-9c8d-7e6f5a4b3c2d"
    }
}