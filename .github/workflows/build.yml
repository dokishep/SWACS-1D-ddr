name: Build SWACS-1D OS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev rsync cpio python3 unzip bc wget zstd libssl-dev libelf-dev file

      - name: Restore Download Cache
        uses: actions/cache/restore@v4
        with:
          path: ~/buildroot_dl
          key: br-dl-${{ hashFiles('os/configs/swacs1d_defconfig') }}
          restore-keys: br-dl-

      - name: Clone Buildroot
        run: |
          # Cloning the specific LTS branch for stability
          git clone --depth 1 --branch 2024.02.x https://git.buildroot.net/buildroot

      - name: Prep Board Files
        run: |
          # 1. Create the target directory structure
          mkdir -p buildroot/board/swacs1d
          
          # 2. Copy your board-specific files into the Buildroot tree
          cp -r os/board/swacs1d/* buildroot/board/swacs1d/
          cp os/configs/swacs1d_defconfig buildroot/configs/
          
          # 3. FIX LINE ENDINGS (Windows CRLF -> Linux LF)
          # This removes the hidden '\r' that causes "Error 127: file not found"
          find buildroot/board/swacs1d/ -name "*.sh" -exec sed -i 's/\r$//' {} +
          
          # 4. Guarantee scripts are executable
          chmod +x buildroot/board/swacs1d/post-image.sh

      - name: Build OS
        run: |
          cd buildroot
          # Load your custom configuration
          make swacs1d_defconfig
          
          # Point Buildroot to the download cache folder
          echo "BR2_DL_DIR=\"/home/runner/work/buildroot_dl\"" >> .config
          
          # Build using 2 cores (optimal for GitHub standard runners)
          make -j2

      - name: Save Download Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/buildroot_dl
          key: br-dl-${{ hashFiles('os/configs/swacs1d_defconfig') }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SWACS-1D-Image
          path: buildroot/output/images/swacs1d.img