name: Build RootDDR OS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev rsync cpio python3 unzip bc \
            wget zstd libssl-dev libelf-dev mtools dosfstools file \
            curl ca-certificates git zip xz-utils

      - name: Restore Download Cache
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/buildroot_dl
          key: br-dl-${{ hashFiles('os/configs/rootddr_defconfig') }}
          restore-keys: br-dl-

      - name: Restore Ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ hashFiles('os/configs/rootddr_defconfig') }}
          restore-keys: br-ccache-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Musl Toolchain
        run: |
          set -euxo pipefail

          curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
            -o musl.tar.xz \
            https://github.com/cross-tools/musl-cross/releases/download/20260515/x86_64-unknown-linux-musl.tar.xz

          tar -xf musl.tar.xz

          echo "$PWD/x86_64-unknown-linux-musl/bin" >> $GITHUB_PATH

      - name: Clone Buildroot
        run: |
          git clone --depth 1 --branch 2025.02.x https://git.buildroot.net/buildroot

      - name: Prep Board Files
        run: |
          mkdir -p buildroot/board/rootddr

          cp -r os/board/rootddr/* buildroot/board/rootddr/
          cp os/configs/rootddr_defconfig buildroot/configs/

          find buildroot/board/rootddr/ -name "*.sh" -exec sed -i 's/\r$//' {} +
          if [ -f buildroot/board/rootddr/post-image.sh ]; then
            chmod +x buildroot/board/rootddr/post-image.sh
          fi

      - name: Build OS
        run: |
          set -euxo pipefail

          cd buildroot

          make rootddr_defconfig

          echo 'BR2_DL_DIR="/home/runner/buildroot_dl"' >> .config

          make -j2

      - name: Save Download Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/buildroot_dl
          key: br-dl-${{ hashFiles('os/configs/rootddr_defconfig') }}

      - name: Save Ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.buildroot-ccache
          key: br-ccache-${{ hashFiles('os/configs/rootddr_defconfig') }}

      - name: Compress Image
        run: |
          xz -T0 -c buildroot/output/images/rootddr.img \
            > buildroot/output/images/rootddr.img.xz

      - name: Upload OS Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RootDDR-Image
          path: buildroot/output/images/rootddr.img.xz

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RootDDR OS v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            buildroot/output/images/rootddr.img.xz