name: Build SWACS1D OS
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/buildroot_dl
            ~/ccache
          key: swacs1d-v1-${{ runner.os }}
      - name: Compile
        run: |
          sudo apt-get install -y build-essential rsync cpio bc python3 unzip wget zstd
          git clone --depth 1 --branch 2024.02.x https://git.buildroot.net/buildroot
          cp os/configs/swacs1d_defconfig buildroot/configs/
          cd buildroot && make swacs1d_defconfig
          echo "BR2_CCACHE_DIR=\"/home/runner/work/ccache\"" >> .config
          make -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: OS-Image
          path: buildroot/output/images/swacs1d.img